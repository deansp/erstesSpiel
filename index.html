<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <svg class="texture-filters" aria-hidden="true" focusable="false">
      <filter id="finger-sand">
        <feTurbulence baseFrequency="0.025" numOctaves="2" seed="8" type="fractalNoise" />
        <feDisplacementMap in="SourceGraphic" scale="0.8" />
      </filter>
    </svg>

    <main class="app">
      <section id="identityScreen" class="screen">
        <h1>Schön, dass du bist.</h1>

        <div class="choice-grid" aria-label="Spieler auswaehlen">
          <button class="choice-button" type="button" data-player="Dean">Dean</button>
          <button class="choice-button" type="button" data-player="Gast">Gast</button>
        </div>
      </section>

      <section id="gameScreen" class="screen is-hidden">
        <header class="game-header">
          <div>
            <p id="statusText" class="eyebrow">Verbinde...</p>
            <h1 id="turnText">Spiel wird geladen</h1>
          </div>
          <button id="newGameButton" class="small-button" type="button">Neue Runde</button>
        </header>

        <div class="share-box">
          <span id="playerText">Du spielst als Dean.</span>
          <button id="copyLinkButton" class="text-button" type="button">Link kopieren</button>
        </div>

        <div id="board" class="board" aria-label="Tic Tac Toe Spielfeld"></div>

        <footer class="footer">
          <span id="messageText">Warte kurz...</span>
          <button id="switchPlayerButton" class="text-button" type="button">Person wechseln</button>
        </footer>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
